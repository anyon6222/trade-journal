<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2ND トレード記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;color:#1a1a2e;font-size:14px}
.hdr{background:#1a1a2e;color:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:16px;font-weight:500}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;padding:0 14px}
.tab{padding:10px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit}
.tab.on{color:#1a1a2e;border-bottom-color:#1a1a2e;font-weight:500}
.pnl{display:none;padding:12px;max-width:860px;margin:0 auto}
.pnl.on{display:block}
.card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:10px}
select,input[type=text],input[type=date],input[type=time]{font-family:inherit;font-size:13px;border:1px solid #e0e0e0;border-radius:8px;padding:7px 10px;background:#fff}
.btn{padding:8px 18px;font-size:13px;border-radius:8px;cursor:pointer;border:none;font-family:inherit;font-weight:500}
.btn-dark{background:#1a1a2e;color:#fff}
.btn-out{background:#fff;color:#1a1a2e;border:1px solid #1a1a2e}
.btn-gray{background:#fff;color:#aaa;border:1px solid #ddd}
.btn-grn{background:#1aaa6a;color:#fff}
.win{color:#1aaa6a}
.lose{color:#ee6a50}
.mar{color:#5a8aee}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1a1a2e;color:#fff;padding:8px;text-align:left;font-size:11px;white-space:nowrap}
td{padding:5px 6px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:nth-child(even) td{background:#fafafa}
.si{width:100%;padding:4px 5px;border:1px solid #ddd;border-radius:5px;font-size:12px;font-family:inherit;background:#fff}
.ti{width:100%;padding:4px 5px;border:1px solid #ddd;border-radius:5px;font-size:12px;font-family:inherit}
.ptabs{display:flex;gap:5px;margin-bottom:10px}
.ptab{padding:5px 12px;font-size:12px;border:1px solid #e0e0e0;border-radius:20px;cursor:pointer;background:#fff;color:#888;font-family:inherit}
.ptab.on{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.bar-wrap{background:#f0f0f0;border-radius:4px;height:6px;width:70px;overflow:hidden;display:inline-block;vertical-align:middle}
.wr100{color:#cc0000;font-weight:700}
.wr90{color:#e63300;font-weight:700}
.wr75{color:#e67700;font-weight:600}
.wr60{color:#cc9900;font-weight:600}
.wrlow{color:#999}
.bar-n{background:#1aaa6a;height:6px;border-radius:4px}
.bar-s{background:#5a8aee;height:6px;border-radius:4px}
.ai-out{background:#f8f8ff;border-radius:10px;padding:14px;font-size:13px;line-height:1.9;box-shadow:0 1px 3px rgba(0,0,0,.06)}
</style>
</head>
<body>
<div class="hdr"><h1>2ND トレード記録</h1><span style="font-size:10px;opacity:.4">v2026.05.01-AS</span></div>
<div class="tabs">
  <button class="tab on" onclick="showTab('inp')">入力</button>
  <button class="tab" onclick="showTab('hist')">履歴</button>
  <button class="tab" onclick="showTab('ana')">分析</button>
  <button class="tab" onclick="showTab('csv')">CSV取込</button>
</div>

<div id="pnl-inp" class="pnl on">
  <div class="card">
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:130px">
        <div style="font-size:11px;color:#888;margin-bottom:3px">日付</div>
        <input type="date" id="idate" style="width:100%">
      </div>
      <div style="flex:1;min-width:120px">
        <div style="font-size:11px;color:#888;margin-bottom:3px">通貨ペア</div>
        <select id="ipair" style="width:100%">
          <option>USD/JPY</option><option>GBP/JPY</option><option>EUR/JPY</option>
          <option>EUR/USD</option><option>AUD/USD</option><option>AUD/JPY</option><option>NZD/JPY</option>
        </select>
      </div>
    </div>
    <div style="overflow-x:auto;margin-bottom:10px">
      <table id="itbl" style="min-width:420px">
        <thead><tr>
          <th style="width:28px">#</th>
          <th style="min-width:70px">時間</th>
          <th style="min-width:80px">H/L</th>
          <th style="min-width:95px">脳死</th>
          <th style="min-width:95px">裁量</th>
          <th style="min-width:80px">メモ</th>
        </tr></thead>
        <tbody id="itbody"></tbody>
      </table>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-out" onclick="addRows(5)">＋ 5行追加</button>
      <button class="btn btn-dark" onclick="saveRec()">💾 記録する</button>
      <button class="btn btn-gray" onclick="clearTbl()">クリア</button>
    </div>
    <div id="smsg" style="font-size:12px;margin-top:6px;min-height:16px;color:#1aaa6a"></div>
  </div>
  <div id="twrp" style="display:none;background:linear-gradient(135deg,#f5f0ff,#ffe8f0);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px"></div>
  <div id="tlist"></div>
</div>

<div id="pnl-hist" class="pnl">
  <div class="ptabs">
    <button class="ptab on" onclick="setHP('all',this)">累計</button>
    <button class="ptab" onclick="setHP('week',this)">1週間</button>
    <button class="ptab" onclick="setHP('month',this)">月間</button>
  </div>
  <div id="hcont"></div>
</div>

<div id="pnl-ana" class="pnl">
  <div class="ptabs">
    <button class="ptab on" onclick="setAP('all',this)">累計</button>
    <button class="ptab" onclick="setAP('week',this)">1週間</button>
    <button class="ptab" onclick="setAP('month',this)">月間</button>
  </div>
  <div id="acont"></div>
  <div class="card" style="margin-top:10px">
    <div style="font-size:13px;font-weight:500;margin-bottom:8px">✨ AI分析</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <select id="fi-pair" class="si"><option value="">通貨ペア（全て）</option><option>USD/JPY</option><option>GBP/JPY</option><option>EUR/JPY</option><option>EUR/USD</option><option>AUD/USD</option><option>AUD/JPY</option><option>NZD/JPY</option></select>
      <select id="fi-dir" class="si"><option value="">方向（全て）</option><option value="high">↑HIGH</option><option value="low">↓LOW</option></select>
      <select id="fi-wd" class="si"><option value="">曜日（全て）</option><option value="月">月曜</option><option value="火">火曜</option><option value="水">水曜</option><option value="木">木曜</option><option value="金">金曜</option></select>
      <select id="fi-time" class="si"><option value="">時間帯（全て）</option><option value="am">午前（〜12:00）</option><option value="pm">午後（12:00〜）</option><option value="09">09時台</option><option value="10">10時台</option><option value="11">11時台</option><option value="12">12時台</option><option value="13">13時台</option><option value="14">14時台</option><option value="15">15時台</option><option value="16">16時台</option><option value="17">17時台</option></select>
    </div>
    <button onclick="runAI()" id="ai-btn" class="btn" style="width:100%;background:linear-gradient(135deg,#7c6af7,#5a8aee);color:#fff;padding:10px;font-size:13px;margin-bottom:8px">✨ AI分析を実行する</button>
    <div id="ai-result"></div>
  </div>
</div>

<div id="pnl-csv" class="pnl">
  <div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:8px">CSV取込</div>
    <div style="font-size:12px;color:#888;margin-bottom:10px;line-height:1.6">
      列順：日付 / 時間 / H or L / 脳死 / 裁量<br>
      結果：○○=勝ち　✕○=マーチン　✕✕=負け
    </div>
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px">
      <div>
        <div style="font-size:11px;color:#888;margin-bottom:3px">通貨ペア</div>
        <select id="cpair" style="padding:7px 10px;border-radius:8px;border:1px solid #e0e0e0;font-family:inherit;font-size:12px">
          <option>USD/JPY</option><option>GBP/JPY</option><option>EUR/JPY</option>
          <option>EUR/USD</option><option>AUD/USD</option><option>AUD/JPY</option><option>NZD/JPY</option>
        </select>
      </div>
      <label style="padding:8px 16px;font-size:12px;border-radius:8px;border:1px solid #7c6af7;color:#7c6af7;cursor:pointer;background:#fff">
        📂 CSVを選択
        <input type="file" accept=".csv" onchange="loadCSV(event)" style="display:none">
      </label>
    </div>
    <div id="cprev" style="display:none;margin-bottom:8px">
      <div id="cprevtbl" style="font-size:11px;overflow-x:auto"></div>
      <button class="btn btn-grn" onclick="saveCSV()" style="margin-top:8px">💾 保存する</button>
    </div>
    <div id="cmsg" style="font-size:12px;color:#1aaa6a;min-height:16px"></div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:10px">データ管理</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-dark" onclick="doExport()">📥 バックアップ</button>
      <label class="btn btn-out" style="cursor:pointer">📤 読込<input type="file" accept=".json" onchange="doImport(event)" style="display:none"></label>
    </div>
    <div id="bmsg" style="font-size:12px;margin-top:6px;color:#1aaa6a;min-height:16px"></div>
  </div>
</div>

<script>
var PAIRS=['USD/JPY','GBP/JPY','EUR/JPY','EUR/USD','AUD/USD','AUD/JPY','NZD/JPY'];
var WD=['日','月','火','水','木','金','土'];
var db=[];
var hp='all';
var ap='all';
var rid=0;
var csvRows=[];

function pad2(n){return('0'+n).slice(-2);}
function today(){var d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function disp(iso){var p=iso.split('-'),dt=new Date(iso+'T00:00:00');return p[0]+'年'+p[1]+'月'+p[2]+'日（'+WD[dt.getDay()]+'）';}
function sv(id){var e=document.getElementById(id);return e?e.value:'';}
function msg(id,t,c){var e=document.getElementById(id);if(!e)return;e.textContent=t;e.style.color=c||'#1aaa6a';setTimeout(function(){e.textContent='';},3000);}
function save(){try{localStorage.setItem('2nd_db',JSON.stringify(db));}catch(e){}}
function load(){try{var d=localStorage.getItem('2nd_db');if(d)db=JSON.parse(d);}catch(e){}}

function showTab(t){
  document.querySelectorAll('.tab').forEach(function(b,i){b.classList.toggle('on',['inp','hist','ana','csv'][i]===t);});
  document.querySelectorAll('.pnl').forEach(function(p){p.classList.remove('on');});
  document.getElementById('pnl-'+t).classList.add('on');
  if(t==='hist')renderHist();
  if(t==='ana')renderAna();
}

function setHP(p,btn){hp=p;document.querySelectorAll('#pnl-hist .ptab').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');renderHist();}
function setAP(p,btn){ap=p;document.querySelectorAll('#pnl-ana .ptab').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');renderAna();}

function fp(list,p){
  var now=new Date();
  return list.filter(function(t){
    if(p==='week'){var w=new Date(now);w.setDate(w.getDate()-7);return t.date>=w.toISOString().slice(0,10);}
    if(p==='month'){var m=new Date(now);m.setDate(m.getDate()-30);return t.date>=m.toISOString().slice(0,10);}
    return true;
  });
}

var ROPTS='<option value="none">—</option><option value="win">○</option><option value="martin">✕○</option><option value="lose">✕✕</option><option value="skip">－</option>';

function addRows(n){for(var i=0;i<n;i++)addRow();}
function addRow(){
  var tbody=document.getElementById('itbody');
  var r=rid++;
  var num=tbody.querySelectorAll('tr').length+1;
  var tr=document.createElement('tr');
  tr.id='r'+r;
  tr.innerHTML=
    '<td style="text-align:center;color:#ccc;font-size:11px">'+num+'</td>'+
    '<td><input id="t'+r+'" type="time" class="ti"></td>'+
    '<td><select id="d'+r+'" class="si"><option value="high">↑HIGH</option><option value="low">↓LOW</option></select></td>'+
    '<td><select id="n'+r+'" class="si">'+ROPTS+'</select></td>'+
    '<td><select id="s'+r+'" class="si">'+ROPTS+'</select></td>'+
    '<td><input id="m'+r+'" type="text" class="ti" placeholder="メモ"></td>';
  tbody.appendChild(tr);
}

function clearTbl(){
  document.getElementById('itbody').innerHTML='';
  rid=0;
  addRows(8);
}

function saveRec(){
  var iso=sv('idate');
  if(!iso){msg('smsg','日付を選択してください','#ee6a50');return;}
  var pair=sv('ipair');
  var rows=document.getElementById('itbody').querySelectorAll('tr');
  var entries=[];
  rows.forEach(function(tr){
    var r=tr.id.slice(1);
    var time=sv('t'+r);
    var dir=sv('d'+r);
    var noshi=sv('n'+r)||'none';
    var sairyo=sv('s'+r)||'none';
    var memo=sv('m'+r);
    if(!time&&noshi==='none'&&sairyo==='none')return;
    entries.push({pair:pair,time:time,dir:dir,noshi:noshi,sairyo:sairyo,memo:memo});
  });
  if(!entries.length){msg('smsg','入力データがありません','#ee6a50');return;}
  var ex=db.find(function(t){return t.date===iso&&t.pair===pair;});
  if(ex){ex.entries=ex.entries.concat(entries);}
  else{db.unshift({id:Date.now(),date:iso,pair:pair,disp:disp(iso),entries:entries});}
  save();renderToday();
  msg('smsg',entries.length+'件記録しました！','#1aaa6a');
  clearTbl();
}

function calcWR(entries,type){
  var ws=0,wm=0,l=0,sk=0,t=0;
  entries.forEach(function(e){
    var r=type==='noshi'?e.noshi:e.sairyo;
    if(!r||r==='none')return;
    if(r==='skip'){sk++;return;}
    t++;
    if(r==='win'){ws++;wm++;}
    else if(r==='martin'){l++;wm++;}
    else l++;
  });
  return{t:t,ws:ws,wm:wm,l:l,sk:sk,s:t?Math.round(ws/t*100):0,m:t?Math.round(wm/t*100):0};
}

function bdg(r){
  if(r==='win')return'<span class="win">○</span>';
  if(r==='martin')return'<span class="mar">✕○</span>';
  if(r==='lose')return'<span class="lose">✕✕</span>';
  if(r==='skip')return'<span style="color:#ccc">－</span>';
  return'<span style="color:#eee">—</span>';
}

function renderToday(){
  var td=today();
  var list=db.filter(function(t){return t.date===td;});
  var wr=document.getElementById('twrp');
  var tl=document.getElementById('tlist');
  if(!list.length){wr.style.display='none';tl.innerHTML='';return;}
  var ae=[];list.forEach(function(t){ae=ae.concat(t.entries);});
  var sn=calcWR(ae,'noshi'),ss=calcWR(ae,'sairyo');
  wr.style.display='block';
  wr.innerHTML='脳死: <b class="win">'+sn.s+'%</b>('+sn.ws+'勝'+sn.l+'敗 '+sn.t+'件) 1M込<b class="mar"> '+sn.m+'%</b>　裁量: <b class="win">'+ss.s+'%</b>('+ss.ws+'勝'+ss.l+'敗 '+ss.t+'件) 1M込<b class="mar"> '+ss.m+'%</b>';
  tl.innerHTML=list.map(function(t,i){
    var lines=t.entries.map(function(e){return e.pair+' '+(e.time||'—')+' '+(e.dir==='high'?'↑H':'↓L')+' 脳死:'+bdg(e.noshi)+' 裁量:'+bdg(e.sairyo)+(e.memo?' <span style="color:#888;font-size:11px">'+e.memo+'</span>':'');});
    return '<div style="background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;gap:8px">'+
      '<div style="background:#1a1a2e;color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">'+(i+1)+'</div>'+
      '<div style="flex:1;font-size:12px;line-height:1.7"><div style="font-size:11px;color:#888;margin-bottom:3px">'+t.disp+' '+t.pair+'</div>'+lines.join('<br>')+'</div>'+
      '<button onclick="delRec('+t.id+')" style="font-size:11px;padding:3px 7px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#aaa;cursor:pointer;flex-shrink:0">削除</button>'+
    '</div>';
  }).join('');
}

function delRec(id){
  if(!confirm('削除しますか？'))return;
  db=db.filter(function(t){return t.id!==id;});
  save();renderToday();
}

function renderHist(){
  var list=fp(db,hp);
  var el=document.getElementById('hcont');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:#ccc">データがありません</div>';return;}
  var ae=[];list.forEach(function(t){ae=ae.concat(t.entries);});
  var sn=calcWR(ae,'noshi'),ss=calcWR(ae,'sairyo');
  var rows=[];
  list.forEach(function(t){t.entries.forEach(function(e){rows.push({disp:t.disp,pair:e.pair,time:e.time,dir:e.dir,noshi:e.noshi,sairyo:e.sairyo,memo:e.memo});});});
  el.innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">'+
      '<div style="background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)"><div style="font-size:11px;color:#888;margin-bottom:4px">脳死 1M込み</div><div style="font-size:22px;font-weight:600" class="'+(sn.m>=60?'win':sn.m>=50?'mar':'lose')+'">'+sn.m+'%</div><div style="font-size:10px;color:#aaa">単発'+sn.s+'% '+sn.t+'件</div></div>'+
      '<div style="background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)"><div style="font-size:11px;color:#888;margin-bottom:4px">裁量 1M込み</div><div style="font-size:22px;font-weight:600" class="'+(ss.m>=60?'win':ss.m>=50?'mar':'lose')+'">'+ss.m+'%</div><div style="font-size:10px;color:#aaa">単発'+ss.s+'% '+ss.t+'件</div></div>'+
    '</div>'+
    '<div style="overflow-x:auto;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)"><table style="min-width:400px;background:#fff">'+
    '<thead><tr><th style="min-width:110px">日付</th><th>通貨</th><th>時間</th><th>H/L</th><th>脳死</th><th>裁量</th><th>メモ</th></tr></thead>'+
    '<tbody>'+rows.map(function(r){return'<tr><td style="font-size:11px;white-space:nowrap">'+r.disp+'</td><td>'+r.pair+'</td><td>'+(r.time||'—')+'</td><td>'+(r.dir==='high'?'↑H':'↓L')+'</td><td>'+bdg(r.noshi)+'</td><td>'+bdg(r.sairyo)+'</td><td style="font-size:11px;color:#888">'+(r.memo||'')+'</td></tr>';}).join('')+'</tbody>'+
    '</table></div>';
}

function acc2(map,k,rn,rs){
  if(!map[k])map[k]={wn:0,mn:0,ln:0,tn:0,ws:0,ms:0,ls:0,ts:0};
  var v=map[k];
  if(rn==='win'){v.wn++;v.mn++;v.tn++;}else if(rn==='martin'){v.mn++;v.ln++;v.tn++;}else if(rn==='lose'){v.ln++;v.tn++;}
  if(rs==='win'){v.ws++;v.ms++;v.ts++;}else if(rs==='martin'){v.ms++;v.ls++;v.ts++;}else if(rs==='lose'){v.ls++;v.ts++;}
}
function wrCls(p){return p===100?'wr100':p>=90?'wr90':p>=75?'wr75':p>=60?'wr60':'wrlow';}
function mkRow2(lbl,v){
  var sn=v.tn?Math.round(v.mn/v.tn*100):null;
  var ss=v.ts?Math.round(v.ms/v.ts*100):null;
  return'<tr>'+
    '<td style="font-size:11px;color:#555">'+lbl+'</td>'+
    '<td class="'+(sn!==null?wrCls(sn):'')+'" style="white-space:nowrap">'+(sn!==null?sn+'%':'—')+'<span style="font-size:10px;color:#aaa;margin-left:3px">'+(v.tn||'')+'</span></td>'+
    '<td><div class="bar-wrap"><div class="bar-n" style="width:'+(sn||0)+'%"></div></div></td>'+
    '<td class="'+(ss!==null?wrCls(ss):'')+'" style="white-space:nowrap">'+(ss!==null?ss+'%':'—')+'<span style="font-size:10px;color:#aaa;margin-left:3px">'+(v.ts||'')+'</span></td>'+
    '<td><div class="bar-wrap"><div class="bar-s" style="width:'+(ss||0)+'%"></div></div></td>'+
  '</tr>';
}
function mkTbl2(title,map,keys){
  if(!keys.length)return'';
  return'<div class="card" style="margin-bottom:10px"><div style="font-size:13px;font-weight:500;margin-bottom:10px">'+title+'</div>'+

      var cols=line.split(',').map(function(s){return s.trim().replace(/^"|"$/g,'');});
      // CSV列: [0]=空, [1]=日付, [2]=時間区分, [3]=時間, [4]=H/L, [5]=脳死, [6]=分, [7]=裁量
      var dateStr=cols[1]||'';
      var m=dateStr.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);

function convRes(s){
  var t=s.trim();
  if(!t||t==='-')return'none';
  // \u3007=〇(漢数字ゼロ) \u25cb=○(白丸) 両対応
  var hasCircle=t.indexOf('\u3007')>=0||t.indexOf('\u25cb')>=0||t.indexOf('O')>=0;
  var hasCross=t.indexOf('\u2715')>=0||t.indexOf('\u00d7')>=0||t.indexOf('X')>=0;
  if(hasCircle&&!hasCross)return'win';
  if(hasCross&&hasCircle)return'martin';
  if(hasCross)return'lose';
  if(t==='\u2212')return'skip';
  return'none';
}

function wrColor(p){
  if(p>=100)return'#cc0000';
  if(p>=85)return'#ee4400';
  if(p>=75)return'#ee8800';
  if(p>=65)return'#5a8aee';

function fmtAI(txt){
  txt=txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // %の数字に色付け（正規表現を使わずsplit方式）
  var parts=txt.split('%');
  var out='';
  for(var i=0;i<parts.length-1;i++){
    var s=parts[i];
    // 末尾の数字を取り出す
    var j=s.length-1;
    while(j>=0&&s[j]>='0'&&s[j]<='9')j--;
    var pre=s.slice(0,j+1);
    var num=s.slice(j+1);
    if(num.length>0){
      out+=pre+'<b style="color:'+wrColor(parseInt(num))+'">'+num+'%</b>';
    }else{
      out+=s+'%';
    }
  }
  out+=parts[parts.length-1];
  out=out.replace(/\n/g,'<br>');
  return out;
}

      html+='<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee">';
      html+='<b>⏰ 時間帯ランキング</b>';
      html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px">';
      html+='<div><div style="font-size:11px;font-weight:600;color:#888;margin-bottom:4px">🧠 脳死</div>';
      html+=tblWrap('時間',tRankedN.slice(0,8).map(function(r,i){return row(r,i,true);}).join(''));
      html+='</div><div><div style="font-size:11px;font-weight:600;color:#888;margin-bottom:4px">🎯 裁量</div>';
      html+=tblWrap('時間',tRankedS.slice(0,8).map(function(r,i){return row(r,i,true);}).join(''));
      html+='</div></div></div>';
    }
    // H/Lマトリックス（divのみ）
    var slots=['09:00','09:15','09:30','09:45','10:00','10:15','10:30','10:45','11:00','11:15','11:30','11:45','12:00'];
    var hasSlot=slots.filter(function(s){return hiMap[s]||loMap[s];});
    if(false&&hasSlot.length){
      html+='<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee">';
      html+='⏰ <b>時間×H/L（脳死1M込み）</b>';
      html+='<div style="margin-top:6px">';
      html+='<div style="display:flex;font-size:11px;font-weight:600;padding:4px 0;border-bottom:2px solid #1a1a2e"><span style="flex:1">時間</span><span style="width:80px;text-align:center">↑HIGH</span><span style="width:80px;text-align:center">↓LOW</span></div>';
      hasSlot.forEach(function(s,i){
        var hw=wr(hiMap[s]),lw=wr(loMap[s]);
        html+='<div style="display:flex;font-size:11px;padding:4px 0;border-bottom:1px solid #f0f0f0;background:'+(i%2?'#fafafa':'#fff')+'">';
        html+='<span style="flex:1;color:#555">'+s+'</span>';
        html+='<span style="width:80px;text-align:center;font-weight:500;color:'+(hiMap[s]?clr(hw):'#ccc')+'">'+( hiMap[s]?hw+'%<small style="color:#aaa;margin-left:2px">'+hiMap[s].t+'</small>':'—')+'</span>';
        html+='<span style="width:80px;text-align:center;font-weight:500;color:'+(loMap[s]?clr(lw):'#ccc')+'">'+( loMap[s]?lw+'%<small style="color:#aaa;margin-left:2px">'+loMap[s].t+'</small>':'—')+'</span>';
        html+='</div>';
      });
      html+='</div></div>';
    }
    // 曜日×時間ランキング
    var wdtR=sort(wdtMap,3);
    if(wdtR.length){
      html+='<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee">';
      html+='<b>📅 曜日×時間 ランキング（脳死1M込み・3件以上）</b>';
      html+=tblWrap('曜日×時間',wdtR.slice(0,10).map(function(r,i){return row(r,i,true);}).join(''));
      var wdtBot=wdtR.filter(function(r){return r.wr<50;}).slice(-3).reverse();
      if(wdtBot.length){
        html+='<div style="font-size:11px;color:#888;margin-top:10px;margin-bottom:4px">⚠️ 避けたいパターン</div>';
        html+=tblWrap('',wdtBot.map(function(r,i){return row(r,i,false);}).join(''));
      }
      html+='</div>';
    }
    // 最強パターンランキング
    var ptnR=sort(ptnMap,3);
    if(ptnR.length){
      html+='<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee">';
      html+='<b>🏆 最強パターンランキング（曜日×時間×H/L・3件以上）</b>';
      html+=tblWrap('パターン',ptnR.slice(0,10).map(function(r,i){return row(r,i,true);}).join(''));
      var ptnBot=ptnR.filter(function(r){return r.wr<50;}).slice(-5).reverse();
      if(ptnBot.length){
        html+='<div style="font-size:11px;color:#888;margin-top:10px;margin-bottom:4px">⚠️ 避けたいパターン</div>';
        html+=tblWrap('',ptnBot.map(function(r,i){return row(r,i,false);}).join(''));
      }
      html+='</div>';
    }

    // デバッグ情報
var win=window.open('','_blank','width=800,height=600,scrollbars=yes');
    win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>AI分析結果</title><style>body{font-family:-apple-system,sans-serif;padding:20px;max-width:800px;margin:0 auto;font-size:13px;line-height:1.8;color:#333}h1{font-size:18px;margin-bottom:16px}table{border-collapse:collapse;width:100%}td,th{border:none}</style></head><body><h1>✨ AI分析結果</h1>'+(filterLabel?'<div style="background:#e8f4fd;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:16px;color:#1a6a9a">🔍 絞り込み: <b>'+filterLabel+'</b>（'+ae.length+'件）</div>':'')+html+'</body></html>');
    win.document.close();
    el.innerHTML='<div style="background:#f0fff4;border-radius:8px;padding:10px;font-size:13px;color:#1aaa6a">✅ 分析結果を別タブで開きました</div>';
    btn.textContent='✨ AI分析を実行する';btn.disabled=false;
  },600);
}
</script>
